services:
  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/idcmohuban/kmuttsts-storage/ssl:/etc/nginx/certs:ro
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proxy

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    expose:
      - "9000"
      - "9001"
    volumes:
      - /mnt/modhubhigh/minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-public}
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - proxy
      - internal

  mc-backup:
    image: minio/mc:RELEASE.2025-04-22T22-12-26Z
    container_name: mc-backup
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - /mnt/modhublow/minio-data:/backup
      - ./mc-backup.sh:/mc-backup.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Bangkok
    entrypoint: ["/bin/sh", "/mc-backup.sh"]
    restart: always
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
    restart: always
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal

volumes:
  prometheus_data:

networks:
  proxy: {}
  internal: {}
